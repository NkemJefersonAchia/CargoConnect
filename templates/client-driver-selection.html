<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoConnect - Select a Driver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        /* Light mode (default) */
        body.light-mode {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EBEBEB;
            --card-bg: #FFFFFF;
            --card-bg-hover: #F0F0F0;
            --border-light: #DDDDDD;
            --border-medium: #CCCCCC;
            --text-primary: #1A1A1A;
            --text-secondary: #4A4A4A;
            --text-tertiary: #6F6F6F;
            --accent-1: #333333;
            --accent-2: #4B4B4B;
            --accent-3: #2F4F4F;
            --accent-4: #5C5147;
            --accent-5: #2F4F2F;
            --gradient-1: linear-gradient(135deg, #333333, #4B4B4B);
            --gradient-2: linear-gradient(135deg, #2F4F4F, #254B4B);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        /* Dark mode */
        body.dark-mode {
            --bg-primary: #2a2929;
            --bg-secondary: #000000;
            --bg-tertiary: #5f5f5f;
            --card-bg: #424242;
            --card-bg-hover: #7c7c7c;
            --border-light: #ffffff;
            --border-medium: #7a7a7a;
            --text-primary: #88b6b6;
            --text-secondary: #aeaeae;
            --text-tertiary: #ffffff;
            --accent-1: #223a22;
            --accent-2: #4e4a4a;
            --accent-3: #DDE1E4;
            --accent-4: #926166;
            --accent-5: #5b90b4;
            --gradient-1: linear-gradient(135deg, #4b4b4b, #C0C0C0);
            --gradient-2: linear-gradient(135deg, #9c9c9c, #B0E0E6);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Theme toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 30px;
            padding: 2px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            margin-right: 12px;
        }

        .theme-option {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-option.active {
            background: var(--bg-primary);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        /* Sidebar (client) */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: 4px;
            padding: 4px 8px;
            margin-bottom: 12px;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-1);
            border-radius: 50%;
        }

        .logo-text {
            font-family: 'Inter', monospace;
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .sidebar-title {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .sidebar-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .nav {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-section {
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0 8px;
            margin: 16px 0 6px;
            font-weight: 500;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 500;
            border-left: 3px solid var(--accent-1);
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
        }

        .data-badge {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: 6px;
            padding: 12px;
        }

        .data-badge-label {
            font-size: 9px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .data-badge-value {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 4px;
        }

        /* Main */
        .main {
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-primary);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
        }

        .breadcrumb {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--card-bg-hover);
            border-color: var(--border-medium);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        /* Page content */
        .page {
            padding: 28px 32px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Section header */
        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .section-title {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .section-sub {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        /* Driver list grid */
        .driver-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .driver-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            cursor: pointer;
        }

        .driver-card:hover {
            border-color: var(--border-medium);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .driver-header {
            background: var(--gradient-2);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .driver-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            margin: 0 auto 15px;
        }

        .driver-name {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .driver-vehicle {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .driver-body {
            padding: 20px;
        }

        .driver-info-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .driver-info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-tertiary);
            font-weight: 500;
            font-size: 13px;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 13px;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stars {
            color: #f39c12;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .rating-value {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .previous-work {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-5);
            font-weight: 600;
            font-size: 13px;
        }

        .previous-work.no {
            color: var(--text-tertiary);
        }

        .badge-previous {
            background: #d4edda;
            color: #155724;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .select-btn {
            width: 100%;
            padding: 12px;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 15px;
            font-size: 14px;
        }

        .select-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        .empty-state {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
            color: var(--text-tertiary);
        }

        .empty-state-title {
            font-size: 1.3em;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .empty-state-text {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .back-btn {
            background: var(--gradient-1);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
            display: inline-block;
        }

        .back-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-240px);
                transition: transform 0.3s;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .driver-list {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body class="light-mode">

<!-- Sidebar (client) -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-badge">
            <span class="logo-dot"></span>
            <span class="logo-text">Client</span>
        </div>
        <div class="sidebar-title">CARGOCONNECT</div>
        <div class="sidebar-sub">Select a driver</div>
    </div>

    <div class="nav">
        <div class="nav-section">Main</div>
        <a class="nav-item" href="client-home.html">
            Home
        </a>
        <a class="nav-item active" href="client-booking.html">
            Book a Cargo
        </a>
        <a class="nav-item" href="client-bookings.html">
            My Bookings
        </a>
        <a class="nav-item" href="client-trips.html">
            My Trips
        </a>

        <div class="nav-section">Account</div>
        <a class="nav-item" href="client-profile.html">
            Profile
        </a>
        <a class="nav-item" href="index.html" onclick="logout()">
            Logout
        </a>
    </div>

    <div class="sidebar-footer">
        <div class="data-badge">
            <div class="data-badge-label">Welcome</div>
            <div class="data-badge-value" id="username">John Doe</div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="main">
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="page-title">Select a Driver</div>
            <span style="color:var(--border-light)">|</span>
            <span class="breadcrumb">Choose a driver for your cargo</span>
        </div>
        <div class="topbar-right">
            <div class="theme-toggle" onclick="toggleTheme()">
                <span class="theme-option active" id="theme-light">Light</span>
                <span class="theme-option" id="theme-dark">Dark</span>
            </div>
            <a href="client-booking.html" class="btn btn-secondary">Back to Booking</a>
        </div>
    </div>

    <!-- Page Content -->
    <div class="page">
        <div class="section-header">
            <div>
                <div class="section-title">Available Drivers</div>
                <div class="section-sub">Based on your cargo details</div>
            </div>
        </div>

        <!-- Driver List -->
        <div class="driver-list" id="driverList">
            <!-- Populated by JS -->
        </div>
    </div>
</main>

<script>
    // Get username from localStorage
    const username = localStorage.getItem('username') || 'John Doe';
    document.getElementById('username').innerText = username;

    // Theme toggle
    function toggleTheme() {
        const body = document.body;
        const lightOption = document.getElementById('theme-light');
        const darkOption = document.getElementById('theme-dark');
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            lightOption.classList.remove('active');
            darkOption.classList.add('active');
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            darkOption.classList.remove('active');
            lightOption.classList.add('active');
        }
    }

    // Logout
    function logout() {
        localStorage.removeItem('username');
        window.location.href = 'index.html';
        return false;
    }

    // ========== Original driver selection functionality ==========
    // Sample driver data (from original)
    const drivers = [
        {
            id: 1,
            name: "Ahmed Hassan",
            vehicle: "Van",
            rating: 4.8,
            reviews: 245,
            previousWork: true,
            trips: 45
        },
        {
            id: 2,
            name: "Maria Rodriguez",
            vehicle: "Truck",
            rating: 4.6,
            reviews: 189,
            previousWork: false,
            trips: 0
        },
        {
            id: 3,
            name: "John Smith",
            vehicle: "Van",
            rating: 4.9,
            reviews: 312,
            previousWork: true,
            trips: 23
        },
        {
            id: 4,
            name: "Fatima Ali",
            vehicle: "Motorcycle",
            rating: 4.7,
            reviews: 156,
            previousWork: false,
            trips: 0
        },
        {
            id: 5,
            name: "James Wilson",
            vehicle: "Truck",
            rating: 4.5,
            reviews: 128,
            previousWork: true,
            trips: 12
        },
        {
            id: 6,
            name: "Sarah Johnson",
            vehicle: "Van",
            rating: 4.8,
            reviews: 267,
            previousWork: false,
            trips: 0
        }
    ];

    const driverList = document.getElementById('driverList');

    if (drivers.length === 0) {
        driverList.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">🚚</div>
                <div class="empty-state-title">No Drivers Available</div>
                <div class="empty-state-text">Unfortunately, no drivers are available for your route at this time.</div>
                <a href="client-booking.html" class="back-btn">← Back to Booking</a>
            </div>
        `;
    } else {
        drivers.forEach(driver => {
            // Create star string without emoji (★ for full, ☆ for empty)
            const fullStars = '★'.repeat(Math.floor(driver.rating));
            const halfStar = (driver.rating % 1 >= 0.5) ? '½' : '';
            const emptyStars = '☆'.repeat(5 - Math.ceil(driver.rating));
            const stars = fullStars + halfStar + emptyStars;

            const previousWorkBadge = driver.previousWork 
                ? `<div class="previous-work"><span class="badge-previous">Worked before (${driver.trips} trips)</span></div>`
                : `<div class="previous-work no">New Driver</div>`;

            const driverCard = document.createElement('div');
            driverCard.className = 'driver-card';
            driverCard.innerHTML = `
                <div class="driver-header">
                    <div class="driver-avatar">${driver.name.charAt(0)}</div>
                    <div class="driver-name">${driver.name}</div>
                    <div class="driver-vehicle">${driver.vehicle}</div>
                </div>
                <div class="driver-body">
                    <div class="driver-info-item">
                        <div class="info-label">Rating</div>
                        <div class="rating">
                            <div class="stars">${stars}</div>
                            <div class="rating-value">${driver.rating} (${driver.reviews})</div>
                        </div>
                    </div>
                    <div class="driver-info-item">
                        <div class="info-label">Experience</div>
                        <div>${previousWorkBadge}</div>
                    </div>
                    <button class="select-btn" onclick="selectDriver(${driver.id}, '${driver.name}')">Select Driver</button>
                </div>
            `;
            driverList.appendChild(driverCard);
        });
    }

    function selectDriver(driverId, driverName) {
        // Store selected driver info
        localStorage.setItem('selectedDriverId', driverId);
        localStorage.setItem('selectedDriverName', driverName);
        
        // Redirect to confirmation page
        window.location.href = 'client-request-sent.html';
    }
</script>
</body>
</html>
