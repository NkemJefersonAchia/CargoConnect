<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoConnect - Driver Trips</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        /* Light mode (default) */
        body.light-mode {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EBEBEB;
            --card-bg: #FFFFFF;
            --card-bg-hover: #F0F0F0;
            --border-light: #DDDDDD;
            --border-medium: #CCCCCC;
            --text-primary: #1A1A1A;
            --text-secondary: #4A4A4A;
            --text-tertiary: #6F6F6F;
            --accent-1: #333333;
            --accent-2: #4B4B4B;
            --accent-3: #2F4F4F;
            --accent-4: #5C5147;
            --accent-5: #2F4F2F;
            --gradient-1: linear-gradient(135deg, #333333, #4B4B4B);
            --gradient-2: linear-gradient(135deg, #2F4F4F, #254B4B);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        /* Dark mode */
        body.dark-mode {
            --bg-primary: #2a2929;
            --bg-secondary: #000000;
            --bg-tertiary: #5f5f5f;
            --card-bg: #424242;
            --card-bg-hover: #7c7c7c;
            --border-light: #ffffff;
            --border-medium: #7a7a7a;
            --text-primary: #88b6b6;
            --text-secondary: #aeaeae;
            --text-tertiary: #ffffff;
            --accent-1: #223a22;
            --accent-2: #4e4a4a;
            --accent-3: #DDE1E4;
            --accent-4: #926166;
            --accent-5: #5b90b4;
            --gradient-1: linear-gradient(135deg, #4b4b4b, #C0C0C0);
            --gradient-2: linear-gradient(135deg, #9c9c9c, #B0E0E6);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Theme toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 30px;
            padding: 2px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            margin-right: 12px;
        }

        .theme-option {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-option.active {
            background: var(--bg-primary);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        /* Sidebar (driver) */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: 4px;
            padding: 4px 8px;
            margin-bottom: 12px;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-1);
            border-radius: 50%;
        }

        .logo-text {
            font-family: 'Inter', monospace;
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .sidebar-title {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .sidebar-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .nav {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-section {
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0 8px;
            margin: 16px 0 6px;
            font-weight: 500;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 500;
            border-left: 3px solid var(--accent-1);
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
        }

        .data-badge {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: 6px;
            padding: 12px;
        }

        .data-badge-label {
            font-size: 9px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .data-badge-value {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 4px;
        }

        /* Main */
        .main {
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-primary);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
        }

        .breadcrumb {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--card-bg-hover);
            border-color: var(--border-medium);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        /* Page content */
        .page {
            padding: 28px 32px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Section header */
        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .section-title {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .section-sub {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .tab-button {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-tertiary);
            border-bottom: 3px solid transparent;
            transition: all 0.15s;
        }

        .tab-button.active {
            color: var(--accent-1);
            border-bottom-color: var(--accent-1);
        }

        .tab-button:hover {
            color: var(--text-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Trips grid */
        .trips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .trip-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .trip-card:hover {
            border-color: var(--border-medium);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .trip-header {
            background: var(--gradient-2);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .trip-header.accepted {
            background: var(--accent-5);
        }

        .trip-header.completed {
            background: var(--accent-3);
        }

        .trip-id {
            font-size: 1.1em;
            font-weight: 700;
        }

        .trip-status {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .trip-body {
            padding: 20px;
        }

        .trip-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .trip-info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            color: var(--text-tertiary);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .info-value {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
        }

        .location-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .location-icon {
            font-size: 14px;
            margin-top: 3px;
            flex-shrink: 0;
            color: var(--text-tertiary);
        }

        .location-address {
            flex: 1;
        }

        .divider {
            border-top: 1px solid var(--border-light);
            margin: 20px 0;
        }

        .customer-info {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .customer-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .customer-details h4 {
            color: var(--text-primary);
            margin-bottom: 3px;
            font-size: 14px;
        }

        .customer-details p {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .customer-rating {
            color: #f39c12;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-small {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            flex: 1;
            text-align: center;
        }

        .btn-small:hover {
            background: var(--card-bg-hover);
            border-color: var(--border-medium);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        .btn-small.primary {
            background: var(--gradient-1);
            color: white;
            border: none;
        }

        .btn-small.primary:hover {
            opacity: 0.9;
        }

        .btn-small.accept {
            background: var(--accent-5);
            color: white;
            border: none;
        }

        .btn-small.accept:hover {
            opacity: 0.9;
        }

        .btn-small.reject {
            background: var(--accent-4);
            color: white;
            border: none;
        }

        .btn-small.reject:hover {
            opacity: 0.9;
        }

        .empty-state {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
            color: var(--text-tertiary);
        }

        .empty-state-title {
            font-size: 1.3em;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .empty-state-text {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-hover);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 15px;
        }

        .modal-header h2 {
            font-size: 1.3em;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-tertiary);
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .contact-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .contact-icon {
            font-size: 1.2em;
            color: var(--accent-1);
        }

        .contact-details h3 {
            font-size: 13px;
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .contact-link {
            color: var(--accent-1);
            text-decoration: none;
            font-size: 12px;
        }

        .contact-link:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-240px);
                transition: transform 0.3s;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .trips-grid {
                grid-template-columns: 1fr;
            }

            .trip-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<script>
    // Get driver name from localStorage
    const driverName = localStorage.getItem('driverName') || 'Driver';

    // Theme toggle
    function toggleTheme() {
        const body = document.body;
        const lightOption = document.getElementById('theme-light');
        const darkOption = document.getElementById('theme-dark');
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            lightOption.classList.remove('active');
            darkOption.classList.add('active');
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            darkOption.classList.remove('active');
            lightOption.classList.add('active');
        }
    }

    // Logout
    function logout() {
        localStorage.removeItem('driverName');
        window.location.href = 'index.html';
        return false;

    function switchTab(tabName, btn) {
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.remove('active');
        });
        document.querySelectorAll('.tab-button').forEach(button => {
            button.classList.remove('active');
        });
        document.getElementById(tabName).classList.add('active');
        btn.classList.add('active');
    }

    function renderTrips(tripsList, containerId, isRequest = false) {
        const container = document.getElementById(containerId);

        if (tripsList.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-title">No Trips</div>
                    <div class="empty-state-text">You don't have any trips in this category at the moment.</div>
                </div>
            `;
            return;
        }

        container.innerHTML = tripsList.map(trip => {
            const isCompleted = containerId === 'completedTrips';
            let headerClass = '';
            if (isCompleted) headerClass = 'completed';
            else if (isRequest) headerClass = '';
            else headerClass = 'accepted';

            return `
                <div class="trip-card">
                    <div class="trip-header ${headerClass}">
                        <div class="trip-id">Trip #${trip.id}</div>
                        <div class="trip-status">${trip.status}</div>
                    </div>
                    <div class="trip-body">
                        <div class="trip-info-grid">
                            <div class="trip-info-item">
                                <div class="info-label">Scheduled Time</div>
                                <div class="info-value">${new Date(trip.shippingTime).toLocaleString()}</div>
                            </div>
                            <div class="trip-info-item">
                                <div class="info-label">Weight</div>
                                <div class="info-value">${trip.weight}</div>
                            </div>
                            <div class="trip-info-item">
                                <div class="info-label">Material</div>
                                <div class="info-value">${trip.material}</div>
                            </div>
                            ${isRequest ? `
                                <div class="trip-info-item">
                                    <div class="info-label">Fare</div>
                                    <div class="info-value">${trip.fare}</div>
                                </div>
                            ` : ''}
                            ${isCompleted ? `
                                <div class="trip-info-item">
                                    <div class="info-label">Completed</div>
                                    <div class="info-value">${new Date(trip.completedAt).toLocaleString()}</div>
                                </div>
                            ` : ''}
                        </div>

                        <div class="location-row">
                            <div class="location-icon">📍</div>
                            <div class="location-address">
                                <div class="info-label">Pickup</div>
                                <div class="info-value">${trip.pickupAddress}</div>
                            </div>
                        </div>

                        <div class="location-row">
                            <div class="location-icon">📍</div>
                            <div class="location-address">
                                <div class="info-label">Drop Off</div>
                                <div class="info-value">${trip.dropoffAddress}</div>
                            </div>
                        </div>

                        <div class="divider"></div>

                        <div class="customer-info">
                            <div class="customer-avatar">${trip.customerName.charAt(0)}</div>
                            <div class="customer-details">
                                <h4>${trip.customerName}</h4>
                                <p class="customer-rating">★ ${trip.customerRating}</p>
                            </div>
                        </div>

                        <div class="button-group">
                            ${isRequest ? `
                                <button class="btn-small accept" onclick="acceptTrip('${trip.id}', '${trip.customerName}')">✓ Accept</button>
                                <button class="btn-small reject" onclick="rejectTrip('${trip.id}')">✗ Reject</button>
                            ` : isCompleted ? `
                                <button class="btn-small primary" onclick="rateCustomer('${trip.customerName}')">Rate Customer</button>
                            ` : `
                                <button class="btn-small primary" onclick="shareLocation('${trip.id}', '${trip.customerName}')">📍 Share Location</button>
                                <button class="btn-small" onclick="openContactModal('${trip.customerName}', '${trip.phone}', '${trip.email}', '${trip.whatsapp}')">Contact</button>
                                <button class="btn-small" onclick="markTripComplete('${trip.id}')">Complete</button>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function acceptTrip(tripId, customerName) {
        alert(`✓ Trip ${tripId} accepted!\n\nYou can now see the customer's contact information.\n\n📍 Share your live location once you pick up the package.`);
    }

    function rejectTrip(tripId) {
        alert(`You rejected trip ${tripId}. This request will be sent to other drivers.`);
    }

    function shareLocation(tripId, customerName) {
        if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    alert(`✓ Live location shared with ${customerName}!\n\nCoordinates: ${lat.toFixed(4)}, ${lng.toFixed(4)}\n\nCustomer can now track your truck in real-time.`);
                    localStorage.setItem('currentDriverLocation', JSON.stringify({ lat, lng, tripId }));
                },
                function(error) {
                    alert('Please enable location sharing to notify the customer of your truck location.');
                }
            );
        } else {
            alert('Your browser does not support geolocation.');
        }
    }

    function markTripComplete(tripId) {
        alert(`✓ Trip ${tripId} marked as completed!\n\nPayment has been processed and will be credited to your account within 24 hours.`);
    }

    function rateCustomer(customerName) {
        alert(`Rate customer ${customerName} (demo).`);
    }

    function openContactModal(customerName, phone, email, whatsapp) {
        document.getElementById('modalCustomerName').textContent = customerName;
        document.getElementById('phoneLink').textContent = phone;
        document.getElementById('phoneLink').href = `tel:${phone}`;
        document.getElementById('emailLink').textContent = email;
        document.getElementById('emailLink').href = `mailto:${email}`;
        document.getElementById('whatsappLink').textContent = whatsapp;
        document.getElementById('whatsappLink').href = `https://wa.me/${whatsapp.replace(/\s+/g, '')}`;
        document.getElementById('contactModal').classList.add('active');
    }

    function closeContactModal() {
        document.getElementById('contactModal').classList.remove('active');
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('contactModal');
        if (event.target === modal) {
            modal.classList.remove('active');
        }
    };

    // Initialize trips
    renderTrips(trips.requests, 'requestsTrips', true);
    renderTrips(trips.upcoming, 'upcomingTrips', false);
    renderTrips(trips.completed, 'completedTrips', false);
</script>
