<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoConnect - My Bookings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        /* Light mode (default) */
        body.light-mode {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EBEBEB;
            --card-bg: #FFFFFF;
            --card-bg-hover: #F0F0F0;
            --border-light: #DDDDDD;
            --border-medium: #CCCCCC;
            --text-primary: #1A1A1A;
            --text-secondary: #4A4A4A;
            --text-tertiary: #6F6F6F;
            --accent-1: #333333;
            --accent-2: #4B4B4B;
            --accent-3: #2F4F4F;
            --accent-4: #5C5147;
            --accent-5: #2F4F2F;
            --gradient-1: linear-gradient(135deg, #333333, #4B4B4B);
            --gradient-2: linear-gradient(135deg, #2F4F4F, #254B4B);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        /* Dark mode */
        body.dark-mode {
            --bg-primary: #2a2929;
            --bg-secondary: #000000;
            --bg-tertiary: #5f5f5f;
            --card-bg: #424242;
            --card-bg-hover: #7c7c7c;
            --border-light: #ffffff;
            --border-medium: #7a7a7a;
            --text-primary: #88b6b6;
            --text-secondary: #aeaeae;
            --text-tertiary: #ffffff;
            --accent-1: #223a22;
            --accent-2: #4e4a4a;
            --accent-3: #DDE1E4;
            --accent-4: #926166;
            --accent-5: #5b90b4;
            --gradient-1: linear-gradient(135deg, #4b4b4b, #C0C0C0);
            --gradient-2: linear-gradient(135deg, #9c9c9c, #B0E0E6);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Theme toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 30px;
            padding: 2px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            margin-right: 12px;
        }

        .theme-option {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-option.active {
            background: var(--bg-primary);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: 4px;
            padding: 4px 8px;
            margin-bottom: 12px;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-1);
            border-radius: 50%;
        }

        .logo-text {
            font-family: 'Inter', monospace;
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .sidebar-title {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .sidebar-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .nav {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-section {
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0 8px;
            margin: 16px 0 6px;
            font-weight: 500;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 500;
            border-left: 3px solid var(--accent-1);
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
        }

        .data-badge {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: 6px;
            padding: 12px;
        }

        .data-badge-label {
            font-size: 9px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .data-badge-value {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 4px;
        }

        /* Main */
        .main {
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-primary);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
        }

        .breadcrumb {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--card-bg-hover);
            border-color: var(--border-medium);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        /* Page content */
        .page {
            padding: 28px 32px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Section header */
        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .section-title {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .section-sub {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        /* Bookings grid */
        .bookings-grid {
            display: grid;
            gap: 20px;
        }

        .booking-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .booking-card:hover {
            border-color: var(--border-medium);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .booking-header {
            background: var(--gradient-1);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .booking-header.pending {
            background: var(--gradient-2);
        }

        .booking-id {
            font-size: 1.1em;
            font-weight: 700;
        }

        .booking-status {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .booking-body {
            padding: 20px;
        }

        .booking-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .booking-info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            color: var(--text-tertiary);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .info-value {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
        }

        .location-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .location-icon {
            font-size: 14px;
            margin-top: 3px;
            flex-shrink: 0;
            color: var(--text-tertiary);
        }

        .location-address {
            flex: 1;
        }

        .divider {
            border-top: 1px solid var(--border-light);
            margin: 20px 0;
        }

        .driver-info {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .driver-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .driver-details h4 {
            color: var(--text-primary);
            margin-bottom: 3px;
            font-size: 14px;
        }

        .driver-details p {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .driver-rating {
            color: #f39c12;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-small {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            flex: 1;
            text-align: center;
        }

        .btn-small:hover {
            background: var(--card-bg-hover);
            border-color: var(--border-medium);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        .btn-small.primary {
            background: var(--gradient-1);
            color: white;
            border: none;
        }

        .btn-small.primary:hover {
            opacity: 0.9;
        }

        .empty-state {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
            color: var(--text-tertiary);
        }

        .empty-state-title {
            font-size: 1.3em;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .empty-state-text {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-hover);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 15px;
        }

        .modal-header h2 {
            font-size: 1.3em;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-tertiary);
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .contact-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .contact-icon {
            font-size: 1.2em;
            color: var(--accent-1);
        }

        .contact-details h3 {
            font-size: 13px;
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .contact-link {
            color: var(--accent-1);
            text-decoration: none;
            font-size: 12px;
        }

        .contact-link:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-240px);
                transition: transform 0.3s;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .booking-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .booking-info-grid {
                grid-template-columns: 1fr;
            }

            .driver-info {
                flex-direction: column;
                text-align: center;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<script>
    // Get username from localStorage
    const username = localStorage.getItem('username') || 'John Doe';
    document.getElementById('username').innerText = username;

    // Theme toggle
    function toggleTheme() {
        const body = document.body;
        const lightOption = document.getElementById('theme-light');
        const darkOption = document.getElementById('theme-dark');
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            lightOption.classList.remove('active');
            darkOption.classList.add('active');
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            darkOption.classList.remove('active');
            lightOption.classList.add('active');
        }
    }

    // Logout
    function logout() {
        localStorage.removeItem('username');
        window.location.href = 'index.html';
        return false;
    }

    // ========== Original bookings functionality ==========
    // Sample booking data (from original)
    const bookings = {
        pending: [
            {
                id: "BK001",

                driverRating: 4.8,
                vehicle: "Van",
                pickupAddress: "123 Main Street, Downtown, Cairo",

                weight: "5 - 50 kg",
                material: "Glass",

                phone: "+20 100 123 4567",
                email: "ahmed.hassan@email.com",
                whatsapp: "+20 100 123 4567"
            },
            {
                id: "BK002",
                driverName: "Maria Rodriguez",
                driverRating: 4.6,
                vehicle: "Truck",
                pickupAddress: "789 Market Road, Helwan, Cairo",
                dropoffAddress: "321 Industrial Zone, 6th of October, Giza",
                shippingTime: "2026-03-06 14:30",
                weight: "20 - 100 kg",
                material: "Mixture",
                status: "Awaiting Response",
                phone: "+20 100 234 5678",
                email: "maria.rodriguez@email.com",
                whatsapp: "+20 100 234 5678"
            },
            {
                id: "BK003",
                driverName: "James Wilson",
                driverRating: 4.5,
                vehicle: "Truck",
                pickupAddress: "555 Commercial St, Nasr City, Cairo",
                dropoffAddress: "999 Logistics Hub, New Cairo, Cairo",
                shippingTime: "2026-03-07 09:00",
                weight: "30 - 80 kg",
                material: "Wood",
                status: "Awaiting Response",
                phone: "+20 100 345 6789",
                email: "james.wilson@email.com",
                whatsapp: "+20 100 345 6789"
            }
        ]
    };

    function renderBookings(bookingsList, containerId) {
        const container = document.getElementById(containerId);

        if (bookingsList.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-title">No Pending Bookings</div>
                    <div class="empty-state-text">You don't have any pending shipments at the moment.</div>
                    <a href="client-booking.html" class="btn btn-primary">Book a Cargo</a>
                </div>
            `;
            return;
        }

        container.innerHTML = bookingsList.map(booking => `
            <div class="booking-card">
                <div class="booking-header pending">
                    <div class="booking-id">Booking #${booking.id}</div>
                    <div class="booking-status">${booking.status}</div>
                </div>
                <div class="booking-body">
                    <div class="booking-info-grid">
                        <div class="booking-info-item">
                            <div class="info-label">Scheduled Time</div>
                            <div class="info-value">${new Date(booking.shippingTime).toLocaleString()}</div>
                        </div>
                        <div class="booking-info-item">
                            <div class="info-label">Weight</div>
                            <div class="info-value">${booking.weight}</div>
                        </div>
                        <div class="booking-info-item">
                            <div class="info-label">Material</div>
                            <div class="info-value">${booking.material}</div>
                        </div>
                    </div>

                    <div class="location-row">
                        <div class="location-icon">📍</div>
                        <div class="location-address">
                            <div class="info-label">Pickup</div>
                            <div class="info-value">${booking.pickupAddress}</div>
                        </div>
                    </div>

                    <div class="location-row" style="margin-top:10px;">
                        <div class="location-icon">📍</div>
                        <div class="location-address">
                            <div class="info-label">Drop Off</div>
                            <div class="info-value">${booking.dropoffAddress}</div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="driver-info">
                        <div class="driver-avatar">${booking.driverName.charAt(0)}</div>
                        <div class="driver-details">
                            <h4>${booking.driverName}</h4>
                            <p>${booking.vehicle}</p>
                            <p class="driver-rating">⭐ ${booking.driverRating}</p>
                        </div>
                    </div>

                    <div class="button-group">
                        <button class="btn-small" onclick="cancelBooking('${booking.id}')">Cancel Request</button>
                        <button class="btn-small primary" onclick="openContactModal('${booking.driverName}', '${booking.phone}', '${booking.email}', '${booking.whatsapp}')">Contact Driver</button>
                        <button class="btn-small" onclick="viewDetails('${booking.id}')">View Details</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function viewDetails(bookingId) {
        alert(`Viewing details for booking ${bookingId}`);
    }

    function cancelBooking(bookingId) {
        if (confirm(`Cancel booking ${bookingId}?`)) {
            alert(`Booking ${bookingId} has been cancelled.`);
        }
    }

    function openContactModal(driverName, phone, email, whatsapp) {
        document.getElementById('modalDriverName').textContent = driverName;
        document.getElementById('phoneLink').textContent = phone;
        document.getElementById('phoneLink').href = `tel:${phone}`;
        document.getElementById('emailLink').textContent = email;
        document.getElementById('emailLink').href = `mailto:${email}`;
        document.getElementById('whatsappLink').textContent = whatsapp;
        document.getElementById('whatsappLink').href = `https://wa.me/${whatsapp.replace(/\s+/g, '')}`;
        document.getElementById('contactModal').classList.add('active');
    }

    function closeContactModal() {
        document.getElementById('contactModal').classList.remove('active');
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('contactModal');
        if (event.target === modal) {
            modal.classList.remove('active');
        }
    };

    // Initialize bookings
    renderBookings(bookings.pending, 'pendingBookings');
</script>
</body>
</html>
