<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoConnect - Driver Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        /* Light mode (default) */
        body.light-mode {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EBEBEB;
            --card-bg: #FFFFFF;
            --card-bg-hover: #F0F0F0;
            --border-light: #DDDDDD;
            --border-medium: #CCCCCC;
            --text-primary: #1A1A1A;
            --text-secondary: #4A4A4A;
            --text-tertiary: #6F6F6F;
            --accent-1: #333333;
            --accent-2: #4B4B4B;
            --accent-3: #2F4F4F;
            --accent-4: #5C5147;
            --accent-5: #2F4F2F;
            --gradient-1: linear-gradient(135deg, #333333, #4B4B4B);
            --gradient-2: linear-gradient(135deg, #2F4F4F, #254B4B);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        /* Dark mode */
        body.dark-mode {
            --bg-primary: #2a2929;
            --bg-secondary: #000000;
            --bg-tertiary: #5f5f5f;
            --card-bg: #424242;
            --card-bg-hover: #7c7c7c;
            --border-light: #ffffff;
            --border-medium: #7a7a7a;
            --text-primary: #88b6b6;
            --text-secondary: #aeaeae;
            --text-tertiary: #ffffff;
            --accent-1: #223a22;
            --accent-2: #4e4a4a;
            --accent-3: #DDE1E4;
            --accent-4: #926166;
            --accent-5: #5b90b4;
            --gradient-1: linear-gradient(135deg, #4b4b4b, #C0C0C0);
            --gradient-2: linear-gradient(135deg, #9c9c9c, #B0E0E6);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Theme toggle (placed in top right corner) */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 30px;
            padding: 2px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            z-index: 10;
        }

        .theme-option {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-option.active {
            background: var(--bg-primary);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: 4px;
            padding: 4px 8px;
            margin-bottom: 20px;
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
        }

        .auth-card h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .role-tag {
            color: var(--accent-2);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .auth-card p {
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-size: 15px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            display: inline-block;
            min-width: 160px;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--card-bg-hover);
            border-color: var(--border-medium);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .back-link {
            margin-top: 30px;
            display: inline-block;
            color: var(--accent-1);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .icon-placeholder {
            font-size: 3em;
            color: var(--accent-2);
            margin-bottom: 15px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            .button-group {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body class="light-mode">
    <!-- Theme Toggle -->
    <div class="theme-toggle" onclick="toggleTheme()">
        <span class="theme-option active" id="theme-light">Light</span>
        <span class="theme-option" id="theme-dark">Dark</span>
    </div>

    <div class="container">
        <div class="auth-card">
            <div class="icon-placeholder">D</div>
            <div class="badge">Driver Portal</div>
            <h1>Driver Portal</h1>
            <div class="role-tag">Driver Access</div>
            <p>Are you a new driver or already registered?</p>
            
            <div class="button-group">
                <a href="/auth/register?role=driver" class="btn btn-primary">Register as Driver</a>
                <a href="/auth/login?role=driver" class="btn btn-secondary">Driver Login</a>
            </div>

            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const lightOption = document.getElementById('theme-light');
            const darkOption = document.getElementById('theme-dark');
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                lightOption.classList.remove('active');
                darkOption.classList.add('active');
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                darkOption.classList.remove('active');
                lightOption.classList.add('active');
            }
        }
    </script>
</body>
</html>
