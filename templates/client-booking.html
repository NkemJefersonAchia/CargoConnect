<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoConnect - Book a Cargo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        /* Light mode (default) */
        body.light-mode {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EBEBEB;
            --card-bg: #FFFFFF;
            --card-bg-hover: #F0F0F0;
            --border-light: #DDDDDD;
            --border-medium: #CCCCCC;
            --text-primary: #1A1A1A;
            --text-secondary: #4A4A4A;
            --text-tertiary: #6F6F6F;
            --accent-1: #333333;
            --accent-2: #4B4B4B;
            --accent-3: #2F4F4F;
            --accent-4: #5C5147;
            --accent-5: #2F4F2F;
            --gradient-1: linear-gradient(135deg, #333333, #4B4B4B);
            --gradient-2: linear-gradient(135deg, #2F4F4F, #254B4B);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        /* Dark mode */
        body.dark-mode {
            --bg-primary: #2a2929;
            --bg-secondary: #000000;
            --bg-tertiary: #5f5f5f;
            --card-bg: #424242;
            --card-bg-hover: #7c7c7c;
            --border-light: #ffffff;
            --border-medium: #7a7a7a;
            --text-primary: #88b6b6;
            --text-secondary: #aeaeae;
            --text-tertiary: #ffffff;
            --accent-1: #223a22;
            --accent-2: #4e4a4a;
            --accent-3: #DDE1E4;
            --accent-4: #926166;
            --accent-5: #5b90b4;
            --gradient-1: linear-gradient(135deg, #4b4b4b, #C0C0C0);
            --gradient-2: linear-gradient(135deg, #9c9c9c, #B0E0E6);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Theme toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 30px;
            padding: 2px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            margin-right: 12px;
        }

        .theme-option {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-option.active {
            background: var(--bg-primary);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        /* Sidebar (client version) */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: 4px;
            padding: 4px 8px;
            margin-bottom: 12px;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-1);
            border-radius: 50%;
        }

        .logo-text {
            font-family: 'Inter', monospace;
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .sidebar-title {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .sidebar-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .nav {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-section {
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0 8px;
            margin: 16px 0 6px;
            font-weight: 500;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 500;
            border-left: 3px solid var(--accent-1);
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
        }

        .data-badge {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            border-radius: 6px;
            padding: 12px;
        }

        .data-badge-label {
            font-size: 9px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .data-badge-value {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 4px;
        }

        /* Main */
        .main {
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-primary);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
        }

        .breadcrumb {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--card-bg-hover);
            border-color: var(--border-medium);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        /* Page content */
        .page {
            padding: 28px 32px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form card */
        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent-1);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
        }

        input[type="text"],
        input[type="number"],
        input[type="datetime-local"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-primary);
            transition: all 0.15s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="datetime-local"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-1);
            background: var(--bg-primary);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .location-options {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .radio-group input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .radio-group label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        .weight-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .material-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .material-option {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .material-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .material-option label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload-label {
            display: block;
            padding: 20px;
            background: var(--bg-tertiary);
            border: 2px dashed var(--accent-1);
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
            color: var(--accent-1);
        }

        .file-upload-label:hover {
            background: var(--card-bg-hover);
        }

        .file-list {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .file-item {
            background: var(--bg-tertiary);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-light);
        }

        .file-item button {
            background: var(--accent-1);
            color: white;
            border: none;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }

        .file-item button:hover {
            opacity: 0.8;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: flex-end;
        }

        .required {
            color: #e74c3c;
        }

        #shareLocation {
            width: 100%;
            padding: 12px;
            background: var(--gradient-2);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.15s;
        }

        #shareLocation:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        #locationStatus {
            margin-top: 10px;
            color: var(--text-tertiary);
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-240px);
                transition: transform 0.3s;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .form-card {
                padding: 20px;
            }

            .weight-range {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="light-mode">

<!-- Sidebar (client) -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-badge">
            <span class="logo-dot"></span>
            <span class="logo-text">Client</span>
        </div>
        <div class="sidebar-title">CARGOCONNECT</div>
        <div class="sidebar-sub">Ship with ease</div>
    </div>

    <div class="nav">
        <div class="nav-section">Main</div>
        <a class="nav-item" href="client-home.html">
            Home
        </a>
        <a class="nav-item active" href="client-booking.html">
            Book a Cargo
        </a>
        <a class="nav-item" href="client-bookings.html">
            My Bookings
        </a>
        <a class="nav-item" href="client-trips.html">
            My Trips
        </a>

        <div class="nav-section">Account</div>
        <a class="nav-item" href="client-profile.html">
            Profile
        </a>
        <a class="nav-item" href="index.html" onclick="logout()">
            Logout
        </a>
    </div>

    <div class="sidebar-footer">
        <div class="data-badge">
            <div class="data-badge-label">Welcome</div>
            <div class="data-badge-value" id="username">John Doe</div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="main">
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="page-title">Book a Cargo</div>
            <span style="color:var(--border-light)">|</span>
            <span class="breadcrumb">Fill in details to book your shipment</span>
        </div>
        <div class="topbar-right">
            <div class="theme-toggle" onclick="toggleTheme()">
                <span class="theme-option active" id="theme-light">Light</span>
                <span class="theme-option" id="theme-dark">Dark</span>
            </div>
            <a href="client-home.html" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>

    <!-- Page Content -->
    <div class="page">
        <div class="form-card">
            <form id="bookingForm">
                <!-- PICKUP ADDRESS SECTION -->
                <div class="section-title">Pickup Location</div>

                <div class="location-options">
                    <div class="radio-group">
                        <input type="radio" id="manual-pickup" name="pickupMethod" value="manual" checked>
                        <label for="manual-pickup">Enter Address Manually</label>
                    </div>
                    <div class="radio-group">
                        <input type="radio" id="live-location" name="pickupMethod" value="live">
                        <label for="live-location">Share Live Location</label>
                    </div>
                </div>

                <div id="manualPickup" class="form-group">
                    <label for="pickupAddress">Pickup Address <span class="required">*</span></label>
                    <textarea id="pickupAddress" name="pickupAddress" placeholder="Enter your pickup address (street, city, postal code)" required></textarea>
                </div>

                <div id="livePickup" class="form-group hidden">
                    <label>Live Location</label>
                    <button type="button" id="shareLocation">Share My Current Location</button>
                    <div id="locationStatus"></div>
                </div>

                <!-- DROP OFF ADDRESS SECTION -->
                <div class="section-title">Drop Off Location</div>

                <div class="form-group">
                    <label for="dropoffAddress">Drop Off Address <span class="required">*</span></label>
                    <textarea id="dropoffAddress" name="dropoffAddress" placeholder="Enter the delivery address (street, city, postal code)" required></textarea>
                </div>

                <!-- SHIPPING TIME SECTION -->
                <div class="section-title">Shipping Details</div>

                <div class="form-group">
                    <label for="shippingTime">Preferred Shipping Time <span class="required">*</span></label>
                    <input type="datetime-local" id="shippingTime" name="shippingTime" required>
                </div>

                <!-- WEIGHT SECTION -->
                <div class="form-group">
                    <label>Weight Estimate <span class="required">*</span></label>
                    <div class="weight-range">
                        <div>
                            <label for="minWeight" style="font-weight: 500; font-size: 12px;">Minimum Weight (kg) <span class="required">*</span></label>
                            <input type="number" id="minWeight" name="minWeight" min="0" step="0.1" placeholder="e.g., 5" required>
                        </div>
                        <div>
                            <label for="maxWeight" style="font-weight: 500; font-size: 12px;">Maximum Weight (kg) <span class="required">*</span></label>
                            <input type="number" id="maxWeight" name="maxWeight" min="0" step="0.1" placeholder="e.g., 50" required>
                        </div>
                    </div>
                </div>

                <!-- MATERIAL SECTION -->
                <div class="form-group">
                    <label>Material of Luggage <span class="required">*</span></label>
                    <div class="material-options">
                        <div class="material-option">
                            <input type="radio" id="glass" name="material" value="glass" required>
                            <label for="glass">Glass</label>
                        </div>
                        <div class="material-option">
                            <input type="radio" id="wood" name="material" value="wood">
                            <label for="wood">Wood</label>
                        </div>
                        <div class="material-option">
                            <input type="radio" id="mixture" name="material" value="mixture">
                            <label for="mixture">Mixture</label>
                        </div>
                        <div class="material-option">
                            <input type="radio" id="other" name="material" value="other">
                            <label for="other">Other</label>
                        </div>
                    </div>
                </div>

                <!-- PICTURES SECTION -->
                <div class="form-group">
                    <label>Pictures <span style="color: var(--text-tertiary); font-weight: 400;">(Optional)</span></label>
                    <div class="file-upload">
                        <input type="file" id="pictures" name="pictures" multiple accept="image/*">
                        <label for="pictures" class="file-upload-label">Click to upload or drag and drop images</label>
                    </div>
                    <div class="file-list" id="fileList"></div>
                </div>

                <!-- BUTTONS -->
                <div class="button-group">
                    <a href="client-home.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Book Cargo</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    // Get username from localStorage
    const username = localStorage.getItem('username') || 'John Doe';
    document.getElementById('username').innerText = username;

    // Theme toggle
    function toggleTheme() {
        const body = document.body;
        const lightOption = document.getElementById('theme-light');
        const darkOption = document.getElementById('theme-dark');
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            lightOption.classList.remove('active');
            darkOption.classList.add('active');
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            darkOption.classList.remove('active');
            lightOption.classList.add('active');
        }
    }

    // Logout
    function logout() {
        localStorage.removeItem('username');
        window.location.href = 'index.html';
        return false;
    }

    // ========== Booking form functionality (preserved from original) ==========

    // Handle pickup method toggle
    const manualPickupRadio = document.getElementById('manual-pickup');
    const liveLocationRadio = document.getElementById('live-location');
    const manualPickupDiv = document.getElementById('manualPickup');
    const livePickupDiv = document.getElementById('livePickup');
    const pickupAddressInput = document.getElementById('pickupAddress');

    manualPickupRadio.addEventListener('change', function() {
        if (this.checked) {
            manualPickupDiv.classList.remove('hidden');
            livePickupDiv.classList.add('hidden');
            pickupAddressInput.required = true;
        }
    });

    liveLocationRadio.addEventListener('change', function() {
        if (this.checked) {
            manualPickupDiv.classList.add('hidden');
            livePickupDiv.classList.remove('hidden');
            pickupAddressInput.required = false;
        }
    });

    // Handle live location sharing
    document.getElementById('shareLocation').addEventListener('click', function(e) {
        e.preventDefault();
        if (navigator.geolocation) {
            this.textContent = 'Getting your location...';
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    document.getElementById('locationStatus').textContent = 
                        `Location captured (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
                    document.getElementById('shareLocation').textContent = 'Location Shared';
                    document.getElementById('shareLocation').disabled = true;
                },
                function() {
                    document.getElementById('locationStatus').textContent = 
                        'Unable to access location. Please allow location access.';
                    document.getElementById('shareLocation').textContent = 'Share My Current Location';
                }
            );
        } else {
            document.getElementById('locationStatus').textContent = 
                'Geolocation is not supported by this browser.';
        }
    });

    // Handle file upload
    const picturesInput = document.getElementById('pictures');
    const fileList = document.getElementById('fileList');
    let uploadedFiles = [];

    picturesInput.addEventListener('change', function() {
        fileList.innerHTML = '';
        uploadedFiles = Array.from(this.files);
        
        uploadedFiles.forEach((file, index) => {
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.innerHTML = `
                📷 ${file.name}
                <button type="button" onclick="removeFile(${index})">Remove</button>
            `;
            fileList.appendChild(fileItem);
        });
    });

    window.removeFile = function(index) {
        uploadedFiles.splice(index, 1);
        const dataTransfer = new DataTransfer();
        uploadedFiles.forEach(file => dataTransfer.items.add(file));
        picturesInput.files = dataTransfer.files;
        picturesInput.dispatchEvent(new Event('change'));
    };

    // Handle form submission
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        // Validate weight
        const minWeight = parseFloat(document.getElementById('minWeight').value);
        const maxWeight = parseFloat(document.getElementById('maxWeight').value);
        if (maxWeight < minWeight) {
            alert('Maximum weight must be greater than or equal to minimum weight.');
            return;
        }

        // Store booking details
        const formData = {
            pickupAddress: document.getElementById('pickupAddress').value,
            dropoffAddress: document.getElementById('dropoffAddress').value,
            shippingTime: document.getElementById('shippingTime').value,
            minWeight: document.getElementById('minWeight').value,
            maxWeight: document.getElementById('maxWeight').value,
            material: document.querySelector('input[name="material"]:checked').value
        };
        localStorage.setItem('bookingDetails', JSON.stringify(formData));
        // Redirect to driver selection page
        window.location.href = 'client-driver-selection.html';
    });

    // Validate weight on max change
    document.getElementById('maxWeight').addEventListener('change', function() {
        const minWeight = parseFloat(document.getElementById('minWeight').value);
        const maxWeight = parseFloat(this.value);
        if (maxWeight < minWeight) {
            alert('Maximum weight must be greater than or equal to minimum weight.');
            this.value = '';
        }
    });
</script>
</body>
</html>
